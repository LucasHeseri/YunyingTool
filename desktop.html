<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片加工工具 - 桌面版</title>
<style>
:root {
  --brand: #0a59f7;
  --brand-hover: #0850e0;
  --brand-light: rgba(10,89,247,0.06);
  --text-primary: rgba(0,0,0,0.9);
  --text-secondary: rgba(0,0,0,0.55);
  --text-tertiary: rgba(0,0,0,0.35);
  --bg-app: #f0f2f5;
  --bg-card: #ffffff;
  --bg-upload: #f8f9fa;
  --border: rgba(0,0,0,0.08);
  --border-upload: rgba(0,0,0,0.15);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius: 12px;
  --transition: 0.2s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans SC", "PingFang SC", "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg-app); color: var(--text-primary);
  min-height: 100vh; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

.app-header {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 56px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; z-index: 10;
}
.app-header__title { font-size: 18px; font-weight: 600; }
.app-header__subtitle { font-size: 13px; color: var(--text-tertiary); }

.app-main {
  display: flex; flex: 1; padding: 24px; gap: 24px;
  min-height: 0; max-width: 1600px; width: 100%; margin: 0 auto;
}

.panel-left { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.panel-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow-card); padding: 20px; }

.tab-nav { display: flex; border-bottom: 1.5px solid var(--border); }
.tab-nav__btn {
  flex: 1; padding: 12px 8px 14px; border: 0; background: transparent;
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; position: relative; transition: color var(--transition);
  font-family: inherit; white-space: nowrap;
}
.tab-nav__btn:hover { color: var(--text-primary); }
.tab-nav__btn.active { color: var(--brand); font-weight: 600; }
.tab-nav__btn.active::after {
  content: ''; position: absolute; bottom: -1.5px; left: 12px; right: 12px;
  height: 2.5px; background: var(--brand); border-radius: 2px;
}

.chips-nav { display: flex; gap: 8px; }
.chips-nav__btn {
  flex: 1; padding: 8px 16px; border: 1.5px solid var(--border); background: transparent;
  border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; font-family: inherit; transition: all var(--transition); text-align: center;
}
.chips-nav__btn:hover { border-color: var(--brand); color: var(--brand); }
.chips-nav__btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }

.upload-zone {
  border: 2px dashed var(--border-upload); border-radius: var(--radius);
  background: var(--bg-upload); padding: 32px 20px; text-align: center;
  cursor: pointer; transition: all var(--transition); display: flex;
  flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 140px;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--brand); background: var(--brand-light); }
.upload-zone.has-image { border-style: solid; border-color: #4caf50; background: #f1f8f4; padding: 12px; min-height: auto; }
.upload-zone__icon { width: 44px; height: 44px; color: var(--text-tertiary); transition: color var(--transition); }
.upload-zone:hover .upload-zone__icon { color: var(--brand); }
.upload-zone__text { font-size: 14px; color: var(--text-secondary); }
.upload-zone__text strong { color: var(--brand); }
.upload-zone__limits { font-size: 12px; color: var(--text-tertiary); }
.upload-zone__thumb { max-width: 100%; max-height: 180px; object-fit: contain; border-radius: 6px; display: none; }
.upload-zone.has-image .upload-zone__thumb { display: block; }
.upload-zone.has-image .upload-zone__icon,
.upload-zone.has-image .upload-zone__text,
.upload-zone.has-image .upload-zone__limits { display: none; }
.upload-zone__file-input { display: none; }
.upload-error { font-size: 12px; color: #e84026; text-align: center; min-height: 18px; line-height: 18px; margin-top: 4px; }

.control-group { display: flex; flex-direction: column; gap: 6px; }
.control-group__label { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.control-group__value { font-size: 13px; color: var(--brand); font-weight: 600; min-width: 42px; text-align: right; }
.control-group__slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; border-radius: 3px; background: rgba(0,0,0,0.1);
  outline: none; cursor: pointer;
}
.control-group__slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 20px; height: 20px; border-radius: 50%; background: var(--brand);
  cursor: pointer; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

.btn-row { display: flex; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px; border: 0; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.btn-primary { flex: 1; background: var(--brand); color: #fff; height: 42px; }
.btn-primary:hover { background: var(--brand-hover); }
.btn-primary:disabled { opacity: 0.4; pointer-events: none; }
.btn-outline {
  background: transparent; color: var(--text-secondary);
  border: 1.5px solid var(--border); height: 42px; padding: 10px 16px;
}
.btn-outline:hover { border-color: var(--text-tertiary); color: var(--text-primary); }

.panel-right { width: 50%; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.preview-card {
  flex: 1; background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); display: flex; align-items: center;
  justify-content: center; overflow: auto; position: relative;
  min-height: 400px; padding: 16px;
}
#previewCanvas { display: block; max-width: 100%; max-height: 100%; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.preview-actions { display: flex; gap: 10px; align-items: center; justify-content: center; }
.preview-info { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 4px 0; }

.toast {
  position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.82); color: #fff; padding: 10px 24px;
  border-radius: 20px; font-size: 14px; font-weight: 500;
  z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

@media (max-width: 900px) {
  .app-main { flex-direction: column; padding: 16px; gap: 16px; }
  .panel-left, .panel-right { width: 100%; flex-shrink: 1; }
  .panel-right { min-height: 350px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<header class="app-header">
  <span class="app-header__title">图片加工工具</span>
  <span class="app-header__subtitle">WalletKit机模 · 图片压缩 · logo处理</span>
</header>

<main class="app-main">

  <aside class="panel-left">

    <div class="panel-card" style="padding: 0;">
      <nav class="tab-nav" id="tabNav">
        <button class="tab-nav__btn active" data-tab="walletkit">WalletKit机模</button>
        <button class="tab-nav__btn" data-tab="compress">图片压缩</button>
        <button class="tab-nav__btn" data-tab="circle">logo处理</button>
      </nav>
    </div>

    <div class="panel-card">
      <div class="upload-zone" id="uploadZone" role="button" tabindex="0">
        <svg class="upload-zone__icon" viewBox="0 0 44 44" fill="none">
          <rect x="2" y="2" width="40" height="40" rx="8" stroke="currentColor" stroke-width="2" stroke-dasharray="4 3"/>
          <line x1="22" y1="14" x2="22" y2="30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="22" x2="30" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p class="upload-zone__text">点击或拖拽<strong>上传图片</strong></p>
        <p class="upload-zone__limits" id="uploadLimits">支持 PNG / JPG / WebP，大小不超过 3MB</p>
        <img class="upload-zone__thumb" id="uploadThumb" alt="已上传图片">
        <input type="file" class="upload-zone__file-input" id="fileInput" accept="image/png,image/jpeg,image/webp">
      </div>
      <p class="upload-error" id="uploadError"></p>
    </div>

    <div class="panel-card" id="controlsCard">
      <div id="ctrlWalletkit">
        <div class="control-group">
          <div class="control-group__label"><span>选择模板</span></div>
          <div class="chips-nav" id="chipsNav">
            <button class="chips-nav__btn active" data-mockup="card">卡片</button>
            <button class="chips-nav__btn" data-mockup="ticket">票券</button>
          </div>
        </div>
      </div>
      <div id="ctrlCompress" style="display:none;">
        <div class="control-group">
          <div class="control-group__label"><span>目标宽度</span><span class="control-group__value" id="cmpWidthVal">100px</span></div>
          <input type="range" class="control-group__slider" id="cmpWidth" min="50" max="800" value="100" step="10">
        </div>
      </div>
      <div id="ctrlCircle" style="display:none;">
        <div class="control-group">
          <div class="control-group__label"><span>处理方式</span></div>
          <div class="chips-nav" id="logoChipsNav">
            <button class="chips-nav__btn active" data-logo="grid">宫格图</button>
            <button class="chips-nav__btn" data-logo="circlelogo">圆形logo</button>
          </div>
        </div>
        <div class="control-group" id="logoGridBadgeGroup" style="margin-top:12px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" id="logoBadgeCheck" style="width:16px;height:16px;accent-color:var(--brand);">
            添加消息提醒圆点（右上角）
          </label>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" id="resetBtn" style="flex:1;">重置</button>
    </div>

  </aside>

  <section class="panel-right">
    <div class="preview-card" id="previewCard">
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="preview-actions"><span class="preview-info" id="previewInfo"></span></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="downloadBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        下载图片
      </button>
    </div>
  </section>

</main>

<script src="./card-original.js"></script>
<script src="./ticket-original.js"></script>

<script>
(function () {
  'use strict';

  // ========================================================================
  // State
  // ========================================================================
  var currentTab = 'walletkit';
  var uploadedImage = null;
  var processedDataUrl = null;
  var toastTimer = null;
  var currentMockupType = 'card';
  var currentLogoType = 'grid';   // 'grid' or 'circlelogo'

  // Original SVG Image objects (base layer with red card area)
  var baseImgCache = {};   // { card: Image, ticket: Image }
  var imagesReady = false;

  // ========================================================================
  // WalletKit config — matches the red rect in the SVGs
  // ========================================================================
  var MOCKUP_CONFIG = {
    card:   { viewBoxW: 823, viewBoxH: 808, rect: { x: 94,  y: 159, w: 634, h: 400, rx: 48 } },
    ticket: { viewBoxW: 687, viewBoxH: 802, rect: { x: 91,  y: 123, w: 519, h: 806, rx: 36 } }
  };

  // ========================================================================
  // DOM
  // ========================================================================
  var $ = function (id) { return document.getElementById(id); };

  var tabNav        = $('tabNav');
  var uploadZone    = $('uploadZone');
  var uploadThumb   = $('uploadThumb');
  var uploadLimits  = $('uploadLimits');
  var uploadError   = $('uploadError');
  var fileInput     = $('fileInput');
  var resetBtn      = $('resetBtn');
  var downloadBtn   = $('downloadBtn');
  var previewCard   = $('previewCard');
  var previewCanvas = $('previewCanvas');
  var previewInfo   = $('previewInfo');
  var toast         = $('toast');
  var chipsNav      = $('chipsNav');

  var ctx = previewCanvas.getContext('2d');

  var ctrlWalletkit = $('ctrlWalletkit');
  var ctrlCompress  = $('ctrlCompress');
  var ctrlCircle    = $('ctrlCircle');
  var cmpWidth      = $('cmpWidth');
  var cmpWidthVal   = $('cmpWidthVal');
  var logoChipsNav  = $('logoChipsNav');
  var logoBadgeCheck = $('logoBadgeCheck');
  var logoGridBadgeGroup = $('logoGridBadgeGroup');

  // ========================================================================
  // Tab config
  // ========================================================================
  var TAB_CONFIG = {
    walletkit: { maxSize: 3 * 1024 * 1024, limits: '支持 PNG / JPG / WebP，大小不超过 3MB' },
    compress:  { maxSize: 3 * 1024 * 1024, limits: '支持 PNG / JPG / WebP，大小不超过 3MB' },
    circle:    { maxSize: 1 * 1024 * 1024, limits: '支持 PNG / JPG / WebP，大小不超过 1MB' }
  };
  var ALLOWED_TYPES = ['image/png', 'image/jpeg', 'image/webp'];

  // ========================================================================
  // Toast
  // ========================================================================
  function showToast(msg) {
    if (toastTimer) clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2000);
  }

  // ========================================================================
  // Load original SVGs (with red placeholder) from data URIs
  // ========================================================================
  function loadBaseImages(callback) {
    var sources = {
      card:   typeof CARD_ORIGINAL   !== 'undefined' ? CARD_ORIGINAL   : null,
      ticket: typeof TICKET_ORIGINAL !== 'undefined' ? TICKET_ORIGINAL : null
    };

    var types = Object.keys(sources);
    var remaining = types.length;

    types.forEach(function (type) {
      if (!sources[type]) { remaining--; checkDone(); return; }
      var img = new Image();
      img.onload = function () {
        baseImgCache[type] = img;
        remaining--;
        checkDone();
      };
      img.onerror = function () {
        console.warn('Failed to load base image: ' + type);
        remaining--;
        checkDone();
      };
      img.src = sources[type];
    });

    function checkDone() {
      if (remaining <= 0) {
        imagesReady = Object.keys(baseImgCache).length > 0;
        if (callback) callback(imagesReady);
      }
    }
  }

  function getBaseImg() { return baseImgCache[currentMockupType]; }

  // ========================================================================
  // Preview Drawing (matches card-replacer.html approach)
  // ========================================================================
  function drawPreview() {
    if (currentTab !== 'walletkit') return;
    var config = MOCKUP_CONFIG[currentMockupType];
    var baseImg = getBaseImg();
    if (!baseImg) return;

    var cw = config.viewBoxW, ch = config.viewBoxH;
    previewCanvas.width = cw;
    previewCanvas.height = ch;

    // Scale CSS to fit
    var cardW = previewCard.clientWidth - 32;
    var cardH = previewCard.clientHeight - 32;
    var scale = Math.min(cardW / cw, cardH / ch, 1);
    previewCanvas.style.width  = Math.round(cw * scale) + 'px';
    previewCanvas.style.height = Math.round(ch * scale) + 'px';

    ctx.clearRect(0, 0, cw, ch);

    // 1. Draw the full original SVG as base layer (includes red card area)
    ctx.drawImage(baseImg, 0, 0, cw, ch);

    // 2. If user image is uploaded, draw it on top of the red card area
    if (uploadedImage) {
      drawUserImageOnCard(config);
    } else {
      // No image yet — show guide overlay
      drawGuideOverlay(config);
    }

    // Store result for download
    if (uploadedImage) {
      processedDataUrl = previewCanvas.toDataURL('image/png');
    }
  }

  function drawUserImageOnCard(config) {
    var r = config.rect;

    ctx.save();
    drawRoundRect(ctx, r.x, r.y, r.w, r.h, r.rx);
    ctx.clip();

    // object-fit: cover — fill the rect while maintaining aspect ratio
    var imgW = uploadedImage.naturalWidth;
    var imgH = uploadedImage.naturalHeight;
    var imgRatio = imgW / imgH;
    var rectRatio = r.w / r.h;
    var sx, sy, sw, sh;

    if (imgRatio > rectRatio) {
      sh = imgH; sw = imgH * rectRatio; sx = (imgW - sw) / 2; sy = 0;
    } else {
      sw = imgW; sh = imgW / rectRatio; sx = 0; sy = (imgH - sh) / 2;
    }
    ctx.drawImage(uploadedImage, sx, sy, sw, sh, r.x, r.y, r.w, r.h);
    ctx.restore();
  }

  function drawGuideOverlay(config) {
    var r = config.rect, cw = config.viewBoxW, ch = config.viewBoxH;

    // Dark overlay with evenodd hole over the card area
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    ctx.beginPath();
    ctx.rect(0, 0, cw, ch);
    drawRoundRect(ctx, r.x, r.y, r.w, r.h, r.rx);
    ctx.fill('evenodd');
    ctx.restore();

    // Dashed blue border around card area
    ctx.save();
    ctx.strokeStyle = '#0a59f7';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([8, 4]);
    drawRoundRect(ctx, r.x, r.y, r.w, r.h, r.rx);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Guide text
    ctx.save();
    ctx.fillStyle = '#fff';
    var fs = Math.max(16, Math.round(r.w / 22));
    ctx.font = 'bold ' + fs + 'px "PingFang SC","HarmonyOS Sans SC",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('📤 上传图片替换此处', r.x + r.w / 2, r.y + r.h / 2 - fs * 0.7);
    ctx.font = Math.round(fs * 0.55) + 'px "PingFang SC","HarmonyOS Sans SC",sans-serif';
    ctx.fillText('点击左侧区域 或 Ctrl+V 粘贴', r.x + r.w / 2, r.y + r.h / 2 + fs * 0.7);
    ctx.restore();
  }

  function drawRoundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function resizeCanvas() {
    var config = MOCKUP_CONFIG[currentMockupType];
    var cw = config.viewBoxW, ch = config.viewBoxH;
    var cardW = previewCard.clientWidth - 32;
    var cardH = previewCard.clientHeight - 32;
    var scale = Math.min(cardW / cw, cardH / ch, 1);
    previewCanvas.style.width  = Math.round(cw * scale) + 'px';
    previewCanvas.style.height = Math.round(ch * scale) + 'px';
  }
  window.addEventListener('resize', function () { if (currentTab === 'walletkit') resizeCanvas(); });

  // ========================================================================
  // Tab Switching
  // ========================================================================
  tabNav.addEventListener('click', function (e) {
    var btn = e.target.closest('.tab-nav__btn');
    if (!btn) return;
    var tab = btn.dataset.tab;
    if (tab === currentTab) return;
    switchTab(tab);
  });

  function switchTab(tab) {
    currentTab = tab;
    tabNav.querySelectorAll('.tab-nav__btn').forEach(function (b) { b.classList.remove('active'); });
    tabNav.querySelector('[data-tab="' + tab + '"]').classList.add('active');

    ctrlWalletkit.style.display = (tab === 'walletkit') ? '' : 'none';
    ctrlCompress.style.display  = (tab === 'compress')  ? '' : 'none';
    ctrlCircle.style.display    = (tab === 'circle')    ? '' : 'none';
    uploadLimits.textContent = TAB_CONFIG[tab].limits;

    if (tab === 'walletkit') {
      previewCanvas.style.display = 'block';
      hideResultImg();
      if (imagesReady) drawPreview();
    } else {
      previewCanvas.style.display = 'none';
    }

    resetAll();
    if (uploadedImage && tab !== 'walletkit') processImage();
  }

  // ========================================================================
  // Chips (卡片 / 票券)
  // ========================================================================
  chipsNav.addEventListener('click', function (e) {
    var btn = e.target.closest('.chips-nav__btn');
    if (!btn) return;
    var mockup = btn.dataset.mockup;
    if (mockup === currentMockupType) return;

    currentMockupType = mockup;
    chipsNav.querySelectorAll('.chips-nav__btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');

    processedDataUrl = null;
    downloadBtn.disabled = !!uploadedImage; // will be enabled after drawPreview

    drawPreview();
  });

  // ========================================================================
  // File Handling
  // ========================================================================
  function validateFile(file) {
    if (!file) return false;
    if (!ALLOWED_TYPES.includes(file.type)) {
      showError('仅支持 PNG / JPG / WebP 格式'); return false;
    }
    if (file.size > TAB_CONFIG[currentTab].maxSize) {
      showError('图片大小超过 ' + (TAB_CONFIG[currentTab].maxSize / 1024 / 1024).toFixed(0) + 'MB');
      return false;
    }
    return true;
  }

  function showError(msg) {
    uploadError.textContent = msg;
    setTimeout(function () { uploadError.textContent = ''; }, 3000);
  }

  function handleFile(file) {
    if (!validateFile(file)) return;
    uploadError.textContent = '';

    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        uploadedImage = img;
        uploadThumb.src = e.target.result;
        uploadZone.classList.add('has-image');

        if (currentTab === 'walletkit') {
          // Auto-composite: draw base + user image on top of red area
          drawPreview();
          downloadBtn.disabled = false;
          previewInfo.textContent = '原图 ' + img.naturalWidth + '×' + img.naturalHeight + ' → ' +
                                    MOCKUP_CONFIG[currentMockupType].viewBoxW + '×' +
                                    MOCKUP_CONFIG[currentMockupType].viewBoxH;
        } else if (currentTab === 'compress' || currentTab === 'circle') {
          processImage();
        }
      };
      img.onerror = function () { showError('图片加载失败，请重试'); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ========================================================================
  // Non-WalletKit Processing
  // ========================================================================
  function processImage() {
    if (!uploadedImage) return;
    if (currentTab === 'compress') processCompress();
    else if (currentTab === 'circle') processLogo();
  }

  function processCompress() {
    var img = uploadedImage;
    var srcW = img.naturalWidth, srcH = img.naturalHeight;
    var targetW = parseInt(cmpWidth.value, 10);
    var outW = targetW, outH = Math.round(srcH * (targetW / srcW));

    var c = document.createElement('canvas'); c.width = outW; c.height = outH;
    c.getContext('2d').drawImage(img, 0, 0, outW, outH);
    processedDataUrl = c.toDataURL('image/png');

    showResultImg();
    downloadBtn.disabled = false;
    previewInfo.textContent = '原图 ' + srcW + '×' + srcH + ' → ' + outW + '×' + outH;
  }

  // ========================================================================
  // Logo Processing — 宫格图 / 圆形logo
  // ========================================================================
  var LOGO_SIZE = 160;

  function processLogo() {
    if (currentLogoType === 'grid') processLogoGrid();
    else processLogoCircle();
  }

  // 宫格图: 160×160, 圆角32px, 可选右上角消息提醒圆点
  function processLogoGrid() {
    var img = uploadedImage;
    var srcW = img.naturalWidth, srcH = img.naturalHeight;
    var size = LOGO_SIZE, radius = 32;

    // Scale to cover 160×160 (object-fit: cover)
    var shortSide = Math.min(srcW, srcH);
    var s = size / shortSide;
    var sw = Math.round(srcW * s), sh = Math.round(srcH * s);

    var c = document.createElement('canvas'); c.width = size; c.height = size;
    var cx = c.getContext('2d');

    // Rounded rect clip
    cx.save();
    cx.beginPath();
    cx.moveTo(radius, 0);
    cx.lineTo(size - radius, 0);
    cx.arcTo(size, 0, size, radius, radius);
    cx.lineTo(size, size - radius);
    cx.arcTo(size, size, size - radius, size, radius);
    cx.lineTo(radius, size);
    cx.arcTo(0, size, 0, size - radius, radius);
    cx.lineTo(0, radius);
    cx.arcTo(0, 0, radius, 0, radius);
    cx.closePath();
    cx.clip();

    // Center the scaled image
    cx.drawImage(img, Math.round((size - sw) / 2), Math.round((size - sh) / 2), sw, sh);
    cx.restore();

    // HarmonyOS notification badge — drawn AFTER clip so it sits above the rounded corners
    if (logoBadgeCheck.checked) {
      var badgeR = 9;
      var badgeCX = size - badgeR;
      var badgeCY = badgeR;

      cx.beginPath();
      cx.arc(badgeCX, badgeCY, badgeR, 0, Math.PI * 2);
      cx.fillStyle = '#FF1949';
      cx.fill();
    }

    processedDataUrl = c.toDataURL('image/png');
    showResultImg();
    downloadBtn.disabled = false;
    previewInfo.textContent = '原图 ' + srcW + '×' + srcH + ' → ' + size + '×' + size + ' 宫格图' + (logoBadgeCheck.checked ? ' (含消息提醒)' : '');
  }

  // 圆形logo: 160×160圆形裁剪
  function processLogoCircle() {
    var img = uploadedImage;
    var srcW = img.naturalWidth, srcH = img.naturalHeight;
    var size = LOGO_SIZE, radius = size / 2;

    // Scale shorter side to 160
    var shortSide = Math.min(srcW, srcH);
    var s = size / shortSide;
    var sw = Math.round(srcW * s), sh = Math.round(srcH * s);

    var c = document.createElement('canvas'); c.width = size; c.height = size;
    var cx = c.getContext('2d');

    // Circle clip
    cx.beginPath();
    cx.arc(radius, radius, radius, 0, Math.PI * 2);
    cx.closePath();
    cx.clip();

    // Center the scaled image
    cx.drawImage(img, Math.round((size - sw) / 2), Math.round((size - sh) / 2), sw, sh);

    processedDataUrl = c.toDataURL('image/png');
    showResultImg();
    downloadBtn.disabled = false;
    previewInfo.textContent = '原图 ' + srcW + '×' + srcH + ' → ' + size + '×' + size + ' 圆形logo';
  }

  // ========================================================================
  // Result image overlay (non-WalletKit tabs)
  // ========================================================================
  var resultImgEl = null;
  function showResultImg() {
    if (!resultImgEl) {
      resultImgEl = document.createElement('img');
      resultImgEl.style.cssText = 'max-width:95%;max-height:600px;object-fit:contain;border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.08);position:relative;z-index:1;';
      previewCard.appendChild(resultImgEl);
    }
    resultImgEl.src = processedDataUrl;
    resultImgEl.style.display = 'block';
    previewCanvas.style.display = 'none';
  }
  function hideResultImg() {
    if (resultImgEl) { resultImgEl.src = ''; resultImgEl.style.display = 'none'; }
  }

  // ========================================================================
  // Download
  // ========================================================================
  function downloadImage() {
    if (!processedDataUrl) return;
    var prefix = currentTab === 'walletkit' ? 'walletkit_' + currentMockupType + '_' :
                 currentTab === 'compress' ? 'compressed_' : 'logo_' + currentLogoType + '_';
    var a = document.createElement('a');
    a.download = prefix + Date.now() + '.png';
    a.href = processedDataUrl;
    a.click();
    showToast('下载完成');
  }

  // ========================================================================
  // Reset
  // ========================================================================
  function resetAll() {
    uploadedImage = null;
    processedDataUrl = null;
    uploadThumb.src = '';
    uploadZone.classList.remove('has-image');
    fileInput.value = '';
    uploadError.textContent = '';
    downloadBtn.disabled = true;
    previewInfo.textContent = '';
    hideResultImg();

    if (currentTab === 'walletkit') {
      previewCanvas.style.display = 'block';
      if (imagesReady) drawPreview();
    }
  }

  // ========================================================================
  // Event Bindings
  // ========================================================================
  uploadZone.addEventListener('click', function () { fileInput.click(); });

  fileInput.addEventListener('change', function (e) {
    if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
    fileInput.value = '';
  });

  uploadZone.addEventListener('dragover', function (e) {
    e.preventDefault(); e.stopPropagation();
    uploadZone.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', function (e) {
    e.preventDefault(); e.stopPropagation();
    uploadZone.classList.remove('drag-over');
  });
  uploadZone.addEventListener('drop', function (e) {
    e.preventDefault(); e.stopPropagation();
    uploadZone.classList.remove('drag-over');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  document.addEventListener('dragover', function (e) { e.preventDefault(); });
  document.addEventListener('drop', function (e) { e.preventDefault(); });

  document.addEventListener('paste', function (e) {
    if (currentTab !== 'walletkit' && currentTab !== 'compress' && currentTab !== 'circle') return;
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.match(/^image\//)) {
        e.preventDefault();
        handleFile(items[i].getAsFile());
        break;
      }
    }
  });

  uploadZone.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });

  resetBtn.addEventListener('click', function () { resetAll(); });
  downloadBtn.addEventListener('click', function () { downloadImage(); });

  cmpWidth.addEventListener('input', function () {
    cmpWidthVal.textContent = this.value + 'px';
    if (uploadedImage && currentTab === 'compress') processCompress();
  });

  // Logo chips switching
  logoChipsNav.addEventListener('click', function (e) {
    var btn = e.target.closest('.chips-nav__btn');
    if (!btn) return;
    var type = btn.dataset.logo;
    if (type === currentLogoType) return;

    currentLogoType = type;
    logoChipsNav.querySelectorAll('.chips-nav__btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');

    // Show/hide badge checkbox (only for 宫格图)
    logoGridBadgeGroup.style.display = (type === 'grid') ? '' : 'none';

    // Re-process if image uploaded
    if (uploadedImage && currentTab === 'circle') processLogo();
  });

  // Badge checkbox change → re-process
  logoBadgeCheck.addEventListener('change', function () {
    if (uploadedImage && currentTab === 'circle' && currentLogoType === 'grid') processLogoGrid();
  });

  // ========================================================================
  // Init
  // ========================================================================
  loadBaseImages(function (ok) {
    if (ok) drawPreview();
  });

})();
</script>

</body>
</html>
